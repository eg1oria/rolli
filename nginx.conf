server {
    listen 80;
    server_name nataliagorlach.kz www.nataliagorlach.kz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name nataliagorlach.kz www.nataliagorlach.kz;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $frontend_upstream frontend:3000;
    set $backend_upstream backend:5000;

    ssl_certificate /etc/letsencrypt/live/nataliagorlach.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nataliagorlach.kz/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://$frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }

    location /_next/static/ {
        proxy_pass http://$frontend_upstream;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /public/ {
        proxy_pass http://$frontend_upstream;
        add_header Cache-Control "public, max-age=86400";
    }

    client_max_body_size 10M;
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
}
