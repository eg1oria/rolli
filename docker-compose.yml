networks:
  dev:

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rolli
      POSTGRES_PASSWORD: rolli_secret
      POSTGRES_DB: rolli
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - '5432'
    networks:
      - dev
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - './nginx.conf:/etc/nginx/conf.d/default.conf'
      - '/etc/letsencrypt:/etc/letsencrypt:ro'
    depends_on:
      - backend
      - frontend
    networks:
      - dev
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    expose:
      - '5000'
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000
      - FRONTEND_URL=https://nataliagorlach.kz
      - DATABASE_URL=postgresql://rolli:rolli_secret@postgres:5432/rolli
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      - postgres
    networks:
      - dev
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    expose:
      - '3000'
    environment:
      - NEXT_PUBLIC_API_URL=/api
    networks:
      - dev
    restart: unless-stopped

volumes:
  backend_uploads:
  postgres_data:
